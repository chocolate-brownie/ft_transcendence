<div class="flex flex-col items-center gap-6 bg-neon-bg">
  <h1 class="text-2xl font-bold text-white/50 -mb-4">Game #4</h1>

<!-- TurnIndicator -->
  <div class="text-center py-3 text-lg font-semibold text-neon-pink animate-pulse -mb-6">
    Your turn (X)

<!-- TurnIndicator -->

<!-- Scoreboard -->
  <!-- Modified size in the class for this mockup only: 
       "max-w-xl" into "max-w-96"

  <div class="w-full max-w-96 rounded-xl border border-black/10 bg-neon-bg p-4 shadow-sm">
    <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-3">
      <!-- Player 1 card -->
      <div data-testid="scoreboard-player1-card"
           class="rounded-lg border px-3 py-3 transition-all duration-200 neon-player-1-selected">
        <p class="text-xs uppercase tracking-wide text-white/50">Player 1</p>
        <div class="mt-2 flex items-center gap-3">
          <img alt="user_1 avatar"
               class="h-11 w-11 rounded-full border border-black/10 object-cover"
               data-testid="player1-avatar-image"
               src="/default-avatar.png">
          <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-white">
              user_1 <span class="text-neon-pink">(X)</span>
            </p>
          </div>
        </div>
      </div>

      <!-- VS separator -->
      <div class="flex flex-col items-center px-2">
        <span class="text-sm font-semibold uppercase tracking-wide text-white/40">VS</span>
      </div>

      <!-- Player 2 card -->
      <div data-testid="scoreboard-player2-card"
           class="rounded-lg border px-3 py-3 text-right transition-all duration-200 neon-player-2">
        <p class="text-xs uppercase tracking-wide text-white/50">Player 2</p>
        <div data-testid="scoreboard-player2-row"
             class="mt-2 flex flex-row-reverse items-center gap-3">
          <img alt="user_2 avatar"
               class="h-11 w-11 rounded-full border border-black/10 object-cover"
               data-testid="player2-avatar-image"
               src="/default-avatar.png">
          <div class="min-w-0 text-right">
            <p class="truncate text-sm font-semibold text-white">
              user_2 <span class="text-neon-cyan">(O)</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
