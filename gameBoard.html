  15% {
    opacity: 1;
    transform: scale(1.05);
  }
  70% {
    opacity: 1;
    transform: scale(1);
  }
  100% {
    opacity: 0;
    transform: scale(0.8);
  }
}

  0% {
    transform: scale(1);

  }
  15% {
    transform: scale(1.04);
    background-color: rgba(196, 193, 199, 0.25)
  }
  40% {
    transform: scale(1.13);
    background-color: rgba(196, 193, 199, 0.25)
  }
  70% {
    transform: scale(1.04);
    background-color: rgba(196, 193, 199, 0.25)
  }
  100% {
    transform: scale(1);
    background-color: transparent;
  }
}

.winner-cell {
  animation: winner-pop 500ms ease-out;
}

/* Pop in X / O */
@keyframes cell-pop {
  0% {
    transform: scale(1.6);
    opacity: 0;
  }
  60% {
    transform: scale(0.95);
    opacity: 1;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.cell-piece {
  display: inline-block;
  animation: cell-pop 160ms ease-out;
}
